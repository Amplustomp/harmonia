services:
  caddy:
    image: caddy:2-alpine
    container_name: harmonia-caddy
    restart: unless-stopped
    depends_on:
      - icecast
    ports:
      - "127.0.0.1:8090:8090"
      - "${LIBRARY_BIND:-0.0.0.0}:${LIBRARY_PORT:-8091}:8091"
    volumes:
      - ./config/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./web:/srv/site:ro
      - ./library:/srv/library:ro
      - ./data:/srv/state:ro
      - "${MUSIC_DIR:-/mnt/ssd-data/Music/mp3}:/library:ro"
      - /mnt/ssd-data/fastfetch/images:/srv/fastfetch:ro

  icecast:
    image: libretime/icecast:latest
    container_name: harmonia-icecast
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${ICECAST_BIND:-127.0.0.1}:${ICECAST_PORT:-8000}:8000"

  liquidsoap:
    image: savonet/liquidsoap:v2.4.0
    container_name: harmonia-liquidsoap
    restart: unless-stopped
    entrypoint:
      - /bin/sh
    depends_on:
      - icecast
    env_file:
      - .env
    volumes:
      - "${MUSIC_DIR:-/mnt/ssd-data/Music/mp3}:/music:ro"
      - ./data:/state
      - ./config/liquidsoap/radio.liq:/etc/liquidsoap/radio.liq:ro
    command:
      - -c
      - |
        mkdir -p /state/library
        find /music -type f -iname "*.flac" | sort | awk '
          function clean_title(path, title) {
            title = path
            sub(/^.*\//, "", title)
            sub(/\.[Ff][Ll][Aa][Cc]$/, "", title)
            sub(/^[0-9]+([._ -]+)?/, "", title)
            gsub(/_/, " ", title)
            return title
          }

          function json_escape(value) {
            gsub(/\\/, "\\\\", value)
            gsub(/"/, "\\\"", value)
            return value
          }

          function liq_escape(value) {
            gsub(/\\/, "\\\\", value)
            gsub(/"/, "\\\"", value)
            return value
          }

          BEGIN {
            manifest = "/state/library/manifest.json"
            print "[" > manifest
          }

          {
            path = $0
            rel = path
            sub(/^\/music\//, "", rel)
            title = clean_title(path)
            track = sprintf("%03d", NR)
            display = "Track " track " - " title
            url = "/originals/" rel

            printf "annotate:radio_track=\"%s\",tracknumber=\"%s\",title=\"%s\":%s\n", track, track, liq_escape(display), path

            if (NR > 1) {
              print "," >> manifest
            }
            printf "  { \"track\": \"%s\", \"title\": \"%s\", \"displayTitle\": \"%s\", \"path\": \"%s\", \"url\": \"%s\" }", track, json_escape(title), json_escape(display), json_escape(rel), json_escape(url) >> manifest
          }

          END {
            print "" >> manifest
            print "]" >> manifest
          }
        ' > /tmp/radio.m3u
        test -s /tmp/radio.m3u
        test -s /state/library/manifest.json
        liquidsoap /etc/liquidsoap/radio.liq
