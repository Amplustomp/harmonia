services:
  caddy:
    image: caddy:2-alpine
    container_name: harmonia-caddy
    restart: unless-stopped
    depends_on:
      - icecast
    ports:
      - "127.0.0.1:8090:8090"
      - "${LIBRARY_BIND:-127.0.0.1}:${LIBRARY_PORT:-8091}:8091"
    volumes:
      - ./config/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./web:/srv/site:ro
      - ./library:/srv/library:ro
      - ./data:/srv/state:ro
      - "${MUSIC_DIR:-/mnt/ssd-data/Music/mp3}:/library:ro"
      - /mnt/ssd-data/fastfetch/images:/srv/fastfetch:ro

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: harmonia-cloudflared
    profiles:
      - tunnel
    user: "0:0"
    restart: unless-stopped
    depends_on:
      - caddy
    volumes:
      - ./config/cloudflared/config.yml:/etc/cloudflared/config.yml:ro
      - "${CLOUDFLARED_CREDENTIALS_FILE:-/home/sergio/.cloudflared/203b947c-5c03-44f2-826b-bf0d02b8a8c3.json}:/etc/cloudflared/credentials.json:ro"
    command:
      - tunnel
      - --config
      - /etc/cloudflared/config.yml
      - --no-autoupdate
      - run

  icecast:
    image: libretime/icecast:latest
    container_name: harmonia-icecast
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${ICECAST_BIND:-127.0.0.1}:${ICECAST_PORT:-8000}:8000"

  liquidsoap:
    build:
      context: .
      dockerfile: config/liquidsoap/Dockerfile
    image: harmonia-liquidsoap:local
    container_name: harmonia-liquidsoap
    user: "0:0"
    restart: unless-stopped
    entrypoint:
      - /bin/sh
    depends_on:
      - icecast
    env_file:
      - .env
    volumes:
      - "${MUSIC_DIR:-/mnt/ssd-data/Music/mp3}:/music:ro"
      - ./data:/state
      - ./config/liquidsoap/radio.liq:/etc/liquidsoap/radio.liq:ro
      - ./src:/app/src:ro
    command:
      - -c
      - |
        mkdir -p /state/library /state/scheduler
        touch /state/now-playing.json /state/played-history.jsonl
        chown liquidsoap:liquidsoap /state /state/now-playing.json /state/played-history.jsonl
        chown -R liquidsoap:liquidsoap /state/scheduler
        PYTHONPATH=/app/src python3 -m harmonia_scheduler.cli library --music-root /music --manifest-output /state/library/manifest.json --playlist-output /tmp/radio.m3u
        test -s /tmp/radio.m3u
        test -s /state/library/manifest.json
        rm -f /state/scheduler/radio.m3u.tmp
        if su -s /bin/sh liquidsoap -c 'PYTHONPATH=/app/src python3 -m harmonia_scheduler.cli --manifest /state/library/manifest.json --state /state/scheduler/state.json playlist --output /state/scheduler/radio.m3u.tmp'; then
          mv /state/scheduler/radio.m3u.tmp /state/scheduler/radio.m3u
        else
          echo "harmonia: scheduler playlist generation failed; Liquidsoap will use /tmp/radio.m3u fallback" >&2
          rm -f /state/scheduler/radio.m3u.tmp /state/scheduler/radio.m3u
        fi
        exec su -s /bin/sh liquidsoap -c 'liquidsoap /etc/liquidsoap/radio.liq'
