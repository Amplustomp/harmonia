<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Harmonia · Admethius Radio</title>
    <meta name="description" content="Harmonia: radio self-hosted de Admethius, servida desde el homelab." />
    <link rel="stylesheet" href="styles.css?v=sticker-volume-2" />
  </head>
  <body>
    <main class="shell">
      <section class="radio-card">
        <div class="visual-panel">
          <img id="sticker" src="/fastfetch/lain.jpg" alt="Sticker aleatorio de la colección fastfetch" />
          <div class="soft-glow" aria-hidden="true"></div>
          <button id="shuffleSticker" type="button">Cambiar sticker</button>
        </div>

        <section class="player-panel" aria-label="Radio player">
          <p class="eyebrow">admethius.quest / radio</p>
          <h1>Harmonia</h1>
          <p class="subtitle">Radio casera para música, ruido bonito y tardes donde el homelab decide comportarse.</p>

          <audio id="player" preload="none" crossorigin="anonymous">
            <source src="/aac" type="audio/aac" />
          </audio>

          <div class="controls">
            <button id="playButton" class="play-button" type="button" aria-label="Reproducir Harmonia">
              <span id="playIcon" aria-hidden="true"></span>
            </button>
            <div>
              <p id="status" class="status">Lista para transmitir</p>
              <p id="nowPlayingTitle" class="hint">Cargando metadata...</p>
            </div>
          </div>

          <div class="volume-control">
            <label for="volumeSlider">Volumen</label>
            <input id="volumeSlider" type="range" min="0" max="1" step="0.01" value="0.8" aria-describedby="volumeValue" />
            <span id="volumeValue" aria-live="polite">80%</span>
          </div>
        </section>
      </section>
    </main>

    <script src="app.js?v=sticker-volume-2" type="module"></script>
  </body>
</html>
