<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Harmonia Library · Local FLAC</title>
    <meta name="description" content="Biblioteca local de Harmonia para buscar Track XX y reproducir FLAC originales." />
    <style>
      :root {
        --ink: #f8fbff;
        --muted: #c5d7ef;
        --deep: #11172b;
        --deepest: #0b1024;
        --button-ink: #17223d;
        --sky-top: #92d9ff;
        --sky-mid: #4f99dd;
        --sky-low: #18254b;
        --ink-rgb: 248, 251, 255;
        --muted-rgb: 197, 215, 239;
        --deep-rgb: 8, 12, 28;
        --deepest-rgb: 11, 16, 36;
        --panel-rgb: 22, 27, 52;
        --violet-panel-rgb: 30, 24, 50;
        --cyan-rgb: 155, 231, 255;
        --blue-rgb: 113, 191, 255;
        --pink-rgb: 246, 168, 215;
        --cream-rgb: 255, 243, 207;
        --panel: rgba(var(--panel-rgb), 0.62);
        --panel-strong: rgba(var(--deepest-rgb), 0.74);
        --line: rgba(var(--ink-rgb), 0.18);
        --line-strong: rgba(var(--ink-rgb), 0.32);
        --cyan: #9be7ff;
        --blue: #72b7ff;
        --pink: #f6a8d7;
        --cream: #fff3cf;
        --shadow: 0 28px 90px rgba(var(--deep-rgb), 0.42);
        --shadow-soft: 0 18px 52px rgba(var(--deep-rgb), 0.28);
        --space-1: 6px;
        --space-2: 10px;
        --space-3: 14px;
        --space-4: 18px;
        --space-5: 24px;
        --space-6: 32px;
        --space-7: 44px;
        --radius-pill: 999px;
        --radius-card: 34px;
        --radius-panel: 24px;
        --duration-fast: 160ms;
      }

      * { box-sizing: border-box; }

      html { min-height: 100%; }

      body {
        min-height: 100vh;
        margin: 0;
        color: var(--ink);
        font-family: "Aptos", "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at 50% 12%, rgba(var(--ink-rgb), 0.38), transparent 22rem),
          radial-gradient(circle at 82% 54%, rgba(var(--pink-rgb), 0.2), transparent 28rem),
          radial-gradient(circle at 13% 76%, rgba(var(--cyan-rgb), 0.16), transparent 24rem),
          linear-gradient(180deg, var(--sky-top) 0%, var(--sky-mid) 34%, var(--sky-low) 70%, var(--deepest) 100%);
        overflow-x: hidden;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background:
          linear-gradient(180deg, rgba(var(--ink-rgb), 0.32), transparent 18%),
          radial-gradient(ellipse at 50% 0%, rgba(var(--ink-rgb), 0.42), transparent 34rem);
        opacity: 0.75;
      }

      body::after {
        content: "";
        position: fixed;
        left: -8vw;
        right: -8vw;
        bottom: -12vh;
        height: 35vh;
        pointer-events: none;
        background:
          radial-gradient(ellipse at 22% 100%, rgba(var(--deep-rgb), 0.55), transparent 35%),
          radial-gradient(ellipse at 78% 100%, rgba(var(--deep-rgb), 0.44), transparent 33%);
        filter: blur(14px);
      }

      a { color: inherit; }

      button,
      input {
        font: inherit;
      }

      :focus-visible {
        outline: 3px solid var(--cream);
        outline-offset: 4px;
      }

      .shell {
        position: relative;
        z-index: 1;
        width: min(1240px, 100%);
        min-height: 100vh;
        margin: 0 auto;
        padding: clamp(var(--space-4), 5vw, 64px);
      }

      .library-card {
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: var(--radius-card);
        background: linear-gradient(145deg, rgba(var(--panel-rgb), 0.74), rgba(var(--violet-panel-rgb), 0.52));
        box-shadow: var(--shadow);
        backdrop-filter: blur(24px) saturate(1.15);
      }

      .hero {
        position: relative;
        display: grid;
        grid-template-columns: minmax(0, 1.12fr) minmax(220px, 0.42fr);
        gap: var(--space-5);
        padding: clamp(var(--space-5), 4vw, var(--space-7));
        border-bottom: 1px solid var(--line);
      }

      .hero::before {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background:
          radial-gradient(circle at 78% 28%, rgba(var(--cyan-rgb), 0.2), transparent 20rem),
          linear-gradient(120deg, rgba(var(--ink-rgb), 0.08), transparent 44%);
      }

      .hero-copy,
      .library-signal {
        position: relative;
      }

      .eyebrow {
        margin: 0 0 var(--space-4);
        color: var(--cyan);
        font-size: 13px;
        font-weight: 900;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      h1 {
        max-width: 560px;
        margin: 0 0 var(--space-3);
        color: var(--cream);
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(34px, 5vw, 64px);
        line-height: 0.94;
        letter-spacing: -0.055em;
        text-shadow: 0 10px 36px rgba(var(--deep-rgb), 0.22);
      }

      .subtitle {
        max-width: 620px;
        margin: 0;
        color: var(--muted);
        font-size: clamp(16px, 1.45vw, 20px);
        line-height: 1.45;
      }

      .library-signal {
        align-self: center;
        min-height: clamp(160px, 20vw, 220px);
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: var(--radius-panel);
        background:
          linear-gradient(180deg, rgba(var(--ink-rgb), 0.1), transparent 42%),
          radial-gradient(circle at 50% 15%, rgba(var(--cyan-rgb), 0.2), transparent 46%),
          rgba(var(--blue-rgb), 0.14);
        box-shadow: var(--shadow-soft);
      }

      .library-signal img {
        width: 100%;
        height: 100%;
        min-height: inherit;
        display: block;
        object-fit: cover;
        object-position: center;
        filter: saturate(1.08) contrast(1.02);
      }

      .signal-glow {
        position: absolute;
        inset: 0;
        pointer-events: none;
        background:
          linear-gradient(180deg, rgba(var(--ink-rgb), 0.14), transparent 42%),
          radial-gradient(circle at 50% 15%, rgba(var(--cyan-rgb), 0.18), transparent 38%),
          linear-gradient(0deg, rgba(var(--deepest-rgb), 0.3), transparent 34%);
        mix-blend-mode: screen;
      }

      .sticker-button {
        position: absolute;
        right: var(--space-3);
        bottom: var(--space-3);
        min-height: 38px;
        border: 1px solid rgba(var(--ink-rgb), 0.28);
        border-radius: var(--radius-pill);
        color: var(--ink);
        background: rgba(var(--deepest-rgb), 0.5);
        padding: 0 var(--space-3);
        box-shadow: 0 14px 34px rgba(var(--deep-rgb), 0.26);
        font-size: 13px;
        font-weight: 850;
        cursor: pointer;
        backdrop-filter: blur(12px) saturate(1.15);
        transition: transform var(--duration-fast) ease, background var(--duration-fast) ease, border-color var(--duration-fast) ease;
      }

      .sticker-button:hover {
        border-color: var(--line-strong);
        background: rgba(var(--deepest-rgb), 0.68);
        transform: translateY(-1px);
      }

      .search-panel {
        display: grid;
        gap: var(--space-4);
        padding: clamp(var(--space-5), 4vw, 42px) clamp(var(--space-5), 5vw, 58px);
        background: rgba(var(--deepest-rgb), 0.18);
      }

      .search-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: var(--space-3);
        align-items: end;
      }

      .search-field {
        display: grid;
        gap: var(--space-2);
      }

      label {
        color: var(--cyan);
        font-size: 13px;
        font-weight: 900;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      input[type="search"] {
        width: 100%;
        min-height: 58px;
        border: 1px solid var(--line-strong);
        border-radius: var(--radius-pill);
        color: var(--ink);
        background: rgba(var(--ink-rgb), 0.1);
        padding: 0 var(--space-5);
        box-shadow: inset 0 1px 0 rgba(var(--ink-rgb), 0.08);
      }

      input[type="search"]::placeholder {
        color: rgba(var(--muted-rgb), 0.72);
      }

      .clear-button,
      .link-button {
        min-height: 48px;
        border: 1px solid var(--line);
        border-radius: var(--radius-pill);
        color: var(--ink);
        background: rgba(var(--ink-rgb), 0.08);
        font-weight: 850;
        text-decoration: none;
        cursor: pointer;
        transition: transform var(--duration-fast) ease, background var(--duration-fast) ease, border-color var(--duration-fast) ease;
      }

      .clear-button {
        padding: 0 var(--space-5);
      }

      .clear-button:hover,
      .link-button:hover {
        border-color: var(--line-strong);
        background: rgba(var(--ink-rgb), 0.15);
        transform: translateY(-1px);
      }

      .summary-row {
        display: flex;
        flex-wrap: wrap;
        gap: var(--space-2);
        align-items: center;
        justify-content: space-between;
        color: var(--muted);
      }

      .count {
        margin: 0;
        font-weight: 850;
      }

      .tip {
        margin: 0;
      }

      .stats-dashboard {
        display: grid;
        gap: var(--space-4);
        padding: var(--space-5) clamp(var(--space-5), 5vw, 58px);
        border-top: 1px solid var(--line);
        border-bottom: 1px solid var(--line);
        background:
          radial-gradient(circle at 12% 18%, rgba(var(--cyan-rgb), 0.12), transparent 16rem),
          linear-gradient(135deg, rgba(var(--deepest-rgb), 0.34), rgba(var(--ink-rgb), 0.07));
      }

      .dashboard-header {
        display: flex;
        flex-wrap: wrap;
        gap: var(--space-2) var(--space-4);
        align-items: end;
        justify-content: space-between;
      }

      .dashboard-title-group {
        display: grid;
        gap: var(--space-1);
      }

      .dashboard-kicker,
      .dashboard-message,
      .metric-label,
      .metric-note,
      .dashboard-empty,
      .row-eyebrow,
      .row-meta {
        margin: 0;
      }

      .dashboard-kicker,
      .metric-label,
      .row-eyebrow {
        color: var(--cyan);
        font-size: 12px;
        font-weight: 900;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      .dashboard-title {
        margin: 0;
        color: var(--cream);
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(24px, 3vw, 38px);
        line-height: 0.98;
        letter-spacing: -0.045em;
      }

      .dashboard-message,
      .metric-note,
      .dashboard-empty,
      .row-meta {
        color: var(--muted);
        line-height: 1.35;
      }

      .metrics-grid,
      .dashboard-lists {
        display: grid;
        gap: var(--space-3);
      }

      .metrics-grid {
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      }

      .dashboard-lists {
        grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      }

      .metric-card,
      .dashboard-list-card,
      .dashboard-state {
        border: 1px solid var(--line);
        border-radius: var(--radius-panel);
        background:
          linear-gradient(135deg, rgba(var(--ink-rgb), 0.09), transparent 48%),
          rgba(var(--panel-rgb), 0.54);
        box-shadow: var(--shadow-soft);
      }

      .metric-card,
      .dashboard-state {
        display: grid;
        gap: var(--space-2);
        padding: var(--space-4);
      }

      .metric-value {
        color: var(--cream);
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(26px, 4vw, 42px);
        font-weight: 900;
        line-height: 0.95;
        letter-spacing: -0.055em;
      }

      .cycle-progress {
        overflow: hidden;
        height: var(--space-1);
        border: 1px solid rgba(var(--ink-rgb), 0.2);
        border-radius: var(--radius-pill);
        background: rgba(var(--deepest-rgb), 0.58);
      }

      .cycle-progress-bar {
        width: 0%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, var(--cyan), var(--cream));
        box-shadow: 0 0 var(--space-4) rgba(var(--cyan-rgb), 0.44);
      }

      .dashboard-list-card {
        overflow: hidden;
        min-width: 0;
      }

      .dashboard-list-title {
        margin: 0;
        padding: var(--space-3) var(--space-4);
        border-bottom: 1px solid var(--line);
        color: var(--cream);
        font-size: 15px;
        font-weight: 900;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .dashboard-list {
        display: grid;
        gap: var(--space-2);
        margin: 0;
        padding: var(--space-3) var(--space-4) var(--space-4);
        list-style: none;
      }

      .dashboard-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: var(--space-3);
        align-items: center;
        min-width: 0;
      }

      .row-main {
        display: grid;
        gap: var(--space-1);
        min-width: 0;
      }

      .row-title,
      .row-value {
        color: var(--ink);
        font-weight: 850;
      }

      .row-title,
      .row-meta {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .row-value {
        border: 1px solid rgba(var(--cream-rgb), 0.28);
        border-radius: var(--radius-pill);
        padding: var(--space-1) var(--space-2);
        color: var(--button-ink);
        background: linear-gradient(135deg, rgba(var(--cyan-rgb), 0.94), rgba(var(--cream-rgb), 0.92));
        font-size: 12px;
        white-space: nowrap;
      }

      .dashboard-empty {
        padding: var(--space-2) 0;
      }

      .results {
        display: grid;
        gap: var(--space-4);
        padding: var(--space-5) clamp(var(--space-5), 5vw, 58px) clamp(var(--space-5), 5vw, 58px);
      }

      .track-card {
        display: grid;
        grid-template-columns: auto minmax(0, 1fr);
        gap: var(--space-4);
        padding: var(--space-4);
        border: 1px solid var(--line);
        border-radius: var(--radius-panel);
        background:
          linear-gradient(135deg, rgba(var(--ink-rgb), 0.1), transparent 48%),
          var(--panel);
        box-shadow: var(--shadow-soft);
      }

      .track-number {
        display: grid;
        place-items: center;
        width: 76px;
        height: 76px;
        border: 1px solid rgba(var(--ink-rgb), 0.34);
        border-radius: 50%;
        color: var(--button-ink);
        background: linear-gradient(135deg, rgba(var(--cyan-rgb), 0.96), rgba(var(--cream-rgb), 0.94));
        box-shadow: 0 18px 44px rgba(var(--blue-rgb), 0.22);
        font-weight: 950;
        letter-spacing: -0.04em;
      }

      .track-body {
        min-width: 0;
        display: grid;
        gap: var(--space-3);
      }

      .track-heading {
        min-width: 0;
        display: grid;
        gap: var(--space-1);
      }

      .track-artist {
        margin: 0;
        color: var(--cyan);
        font-size: 13px;
        font-weight: 900;
        letter-spacing: 0.12em;
        line-height: 1.2;
        text-transform: uppercase;
        overflow-wrap: anywhere;
      }

      .track-title {
        margin: 0;
        color: var(--ink);
        font-size: clamp(17px, 1.6vw, 22px);
        font-weight: 850;
        line-height: 1.2;
        overflow-wrap: anywhere;
      }

      .track-meta,
      .track-path {
        margin: 0;
        color: var(--muted);
        line-height: 1.45;
      }

      .track-path {
        overflow-wrap: anywhere;
        font-size: 14px;
      }

      .player-row {
        display: grid;
        grid-template-columns: minmax(220px, 1fr) auto;
        gap: var(--space-3);
        align-items: center;
      }

      audio {
        width: 100%;
        min-height: 42px;
        color-scheme: dark;
      }

      .link-button {
        display: inline-grid;
        min-height: 44px;
        place-items: center;
        padding: 0 var(--space-4);
        white-space: nowrap;
      }

      .state-card {
        display: grid;
        gap: var(--space-2);
        padding: var(--space-6);
        border: 1px dashed var(--line-strong);
        border-radius: var(--radius-panel);
        background: var(--panel-strong);
        text-align: center;
      }

      .state-card strong {
        color: var(--cream);
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(28px, 5vw, 48px);
        line-height: 0.95;
        letter-spacing: -0.05em;
      }

      .state-card p {
        max-width: 650px;
        margin: 0 auto;
        color: var(--muted);
      }

      @media (max-width: 860px) {
        .hero,
        .search-row,
        .player-row {
          grid-template-columns: 1fr;
        }

        .library-signal {
          min-height: clamp(180px, 38vw, 240px);
        }
      }

      @media (max-width: 620px) {
        .shell {
          padding: var(--space-3);
        }

        .hero,
        .search-panel,
        .stats-dashboard,
        .results {
          padding-left: var(--space-4);
          padding-right: var(--space-4);
        }

        .dashboard-row {
          grid-template-columns: 1fr;
        }

        .track-card {
          grid-template-columns: 1fr;
        }

        .track-number {
          width: 64px;
          height: 64px;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="library-card" aria-labelledby="pageTitle">
        <header class="hero">
          <div class="hero-copy">
            <p class="eyebrow">localhost / harmonia library</p>
            <h1 id="pageTitle">FLAC vault</h1>
            <p class="subtitle">Busca el Track XX que escuchaste en la radio y abre el original local sin pelear con nombres de archivo imposibles.</p>
          </div>
          <aside class="library-signal" aria-label="Sticker visual de Harmonia Library">
            <img id="librarySticker" src="/fastfetch/lain.jpg" alt="Sticker aleatorio de la colección fastfetch" />
            <div class="signal-glow" aria-hidden="true"></div>
            <button id="shuffleSticker" class="sticker-button" type="button">Cambiar sticker</button>
          </aside>
        </header>

        <section id="statsDashboard" class="stats-dashboard" aria-label="Dashboard operador de biblioteca" aria-live="polite">
          <div class="dashboard-state">
            <p class="dashboard-kicker">operator dashboard</p>
            <p class="dashboard-message">Cargando /stats.json...</p>
          </div>
        </section>

        <section class="search-panel" aria-label="Búsqueda de biblioteca">
          <div class="search-row">
            <div class="search-field">
              <label for="searchInput">Buscar track local</label>
              <input id="searchInput" type="search" autocomplete="off" placeholder="28, Track 028, artista, título o ruta" />
            </div>
            <button id="clearButton" class="clear-button" type="button">Limpiar</button>
          </div>
          <div class="summary-row" aria-live="polite" aria-atomic="true">
            <p id="resultCount" class="count">Cargando manifest...</p>
            <p class="tip">Cada tarjeta reproduce el FLAC servido desde <code>/originals</code>.</p>
          </div>
        </section>

        <section id="results" class="results" aria-label="Resultados de biblioteca"></section>
      </section>
    </main>

    <template id="trackTemplate">
      <article class="track-card">
        <div class="track-number"></div>
        <div class="track-body">
          <div class="track-heading">
            <p class="track-artist"></p>
            <h2 class="track-title"></h2>
            <p class="track-meta"></p>
          </div>
          <p class="track-path"></p>
          <div class="player-row">
            <audio controls preload="none"></audio>
            <a class="link-button" href="#">Abrir / descargar</a>
          </div>
        </div>
      </article>
    </template>

    <script>
      const searchInput = document.querySelector('#searchInput');
      const clearButton = document.querySelector('#clearButton');
      const resultCount = document.querySelector('#resultCount');
      const statsDashboard = document.querySelector('#statsDashboard');
      const results = document.querySelector('#results');
      const trackTemplate = document.querySelector('#trackTemplate');
      const librarySticker = document.querySelector('#librarySticker');
      const shuffleSticker = document.querySelector('#shuffleSticker');

      const numberFormatter = new Intl.NumberFormat('es-CL');
      const STATS_REFRESH_INTERVAL_MS = 15000;

      let library = [];
      let visibleTracks = [];
      let statsRefreshInFlight = false;

      function normalizeText(value) {
        return String(value || '').trim().toLocaleLowerCase('es');
      }

      async function setRandomSticker() {
        try {
          const response = await fetch('/image-manifest.json', { cache: 'no-cache' });
          if (!response.ok) throw new Error(`Image manifest HTTP ${response.status}`);
          const images = await response.json();
          const image = Array.isArray(images) && images.length ? images[Math.floor(Math.random() * images.length)] : 'lain.jpg';
          librarySticker.src = `/fastfetch/${encodeURIComponent(image)}`;
        } catch (error) {
          librarySticker.src = '/fastfetch/lain.jpg';
          console.warn('Image manifest unavailable; using fallback library sticker.', error);
        }
      }

      function cleanTitle(value) {
        return String(value || '')
          .replace(/\.[a-z0-9]{2,5}$/i, '')
          .replace(/^track\s*0*\d+\s*[-:–—]\s*/i, '')
          .replace(/^\d+\s*[.-]\s*/, '')
          .trim();
      }

      function pickFirst(record, fields) {
        for (const field of fields) {
          const value = record[field];
          if (value !== undefined && value !== null && String(value).trim()) return value;
        }
        return '';
      }

      function normalizeTrackNumber(value) {
        const match = normalizeText(value).match(/(?:track\s*)?0*(\d+)/);
        if (!match) return '';
        return String(Number(match[1])).padStart(3, '0');
      }

      function normalizeExplicitTrackNumber(value) {
        const text = normalizeText(value);
        const match = text.match(/^track\s*0*(\d+)(?:\s*[-:–—].*)?$/) || text.match(/^0*(\d+)$/);
        if (!match) return '';
        return String(Number(match[1])).padStart(3, '0');
      }

      function normalizeTrackQuery(value) {
        const text = normalizeText(value);
        if (!/^(?:track\s*)?0*\d+$/.test(text)) return '';
        return normalizeTrackNumber(text);
      }

      function trackLabel(track) {
        const normalized = normalizeTrackNumber(track);
        return normalized ? `Track ${normalized}` : 'Track ???';
      }

      function displayTitle(item) {
        return item.title || cleanTitle(item.displayTitle) || trackLabel(item.track);
      }

      function metadataKeysFromValues(values) {
        const keys = [];
        values.forEach((value) => {
          const trackNumber = normalizeExplicitTrackNumber(value);
          if (trackNumber) keys.push(`track:${trackNumber}`);

          const title = normalizeText(cleanTitle(value));
          if (title && !/^\d+$/.test(title)) keys.push(`title:${title}`);
        });

        return [...new Set(keys)];
      }

      function statsEntries(stats) {
        const sections = ['recently_played', 'top_tracks', 'tracks'];
        return sections.flatMap((section) => {
          const value = stats && stats[section];
          const entries = Array.isArray(value) ? value : Object.values(value || {});
          return entries.filter((entry) => entry && typeof entry === 'object').map((entry) => ({ entry, section }));
        });
      }

      function listenCountFromEntry(entry, section) {
        const value = pickFirst(entry, ['listenCount', 'listen_count', 'playCount', 'play_count', 'plays', 'count', 'total']);
        const count = Number(value);
        if (Number.isFinite(count) && count > 0) return count;
        return 0;
      }

      function metadataFromEntry(entry, section) {
        const trackValue = pickFirst(entry, ['track', 'trackNumber', 'track_number', 'id', 'path', 'url', 'file']);
        const titleValue = pickFirst(entry, ['title', 'name']) || (!normalizeTrackNumber(trackValue) ? trackValue : '');
        return {
          artist: pickFirst(entry, ['artist', 'albumArtist', 'albumartist', 'album_artist']),
          title: cleanTitle(titleValue),
          album: pickFirst(entry, ['album', 'release']),
          genre: pickFirst(entry, ['genre']),
          listenCount: listenCountFromEntry(entry, section),
          keys: metadataKeysFromValues([trackValue, titleValue, entry.path, entry.url, entry.file]),
        };
      }

      function mergeMetadata(target, source) {
        ['artist', 'title', 'album', 'genre'].forEach((field) => {
          if (!target[field] && source[field]) target[field] = source[field];
        });

        if (source.listenCount && !target.listenCount) target.listenCount = source.listenCount;
        return target;
      }

      function buildStatsMetadata(stats) {
        const metadataByKey = new Map();
        statsEntries(stats).forEach(({ entry, section }) => {
          const metadata = metadataFromEntry(entry, section);
          if (!metadata.keys.length) return;

          const sharedMetadata = metadata.keys.map((key) => metadataByKey.get(key)).find(Boolean) || {};
          mergeMetadata(sharedMetadata, metadata);
          metadata.keys.forEach((key) => metadataByKey.set(key, sharedMetadata));
        });

        return metadataByKey;
      }

      function findStatsMetadata(item, metadataByKey) {
        const keys = metadataKeysFromValues([item.track, item.title, item.displayTitle, item.path, item.url]);
        const matches = [...new Set(keys.map((key) => metadataByKey.get(key)).filter(Boolean))];
        return matches.reduce((metadata, match) => mergeMetadata(metadata, match), {});
      }

      function enrichManifest(manifest, metadataByKey) {
        if (!metadataByKey.size) return manifest;

        return manifest.map((item) => {
          const metadata = findStatsMetadata(item, metadataByKey);
          return {
            ...item,
            artist: item.artist || metadata.artist,
            title: item.title || metadata.title,
            album: item.album || metadata.album,
            genre: item.genre || metadata.genre,
            listenCount: item.listenCount || metadata.listenCount,
          };
        });
      }

      async function fetchStatsMetadata() {
        try {
          const response = await fetch('/stats.json', { cache: 'no-store' });
          if (!response.ok) throw new Error(`Stats HTTP ${response.status}`);

          const stats = await response.json();
          return { stats, metadataByKey: buildStatsMetadata(stats), unavailable: false };
        } catch (error) {
          console.warn('Stats metadata unavailable; using manifest-only library.', error);
          return { stats: null, metadataByKey: new Map(), unavailable: true };
        }
      }

      function formatNumber(value) {
        const number = Number(value);
        if (!Number.isFinite(number)) return '0';
        return numberFormatter.format(number);
      }

      function finiteNumber(value, fallback = 0) {
        const number = Number(value);
        return Number.isFinite(number) ? number : fallback;
      }

      function limitedStatsEntries(value, keyField, limit = 5) {
        const entries = Array.isArray(value)
          ? value
          : Object.entries(value || {}).map(([key, entry]) => {
              if (entry && typeof entry === 'object') {
                const normalized = { ...entry };
                if (!pickFirst(normalized, [keyField, 'track', 'title', 'artist', 'name', 'label'])) normalized[keyField] = key;
                return normalized;
              }

              return { [keyField]: key, count: entry };
            });

        return entries
          .filter((entry) => entry !== undefined && entry !== null && String(entry).trim() !== '')
          .slice(0, limit)
          .map((entry) => (entry && typeof entry === 'object' ? entry : { [keyField]: entry }));
      }

      function dashboardTrackValue(entry) {
        return pickFirst(entry, ['track', 'trackNumber', 'track_number', 'label', 'id', 'path', 'url', 'file', 'name']);
      }

      function dashboardTrackLabel(entry) {
        const label = trackLabel(dashboardTrackValue(entry));
        return label === 'Track ???' ? pickFirst(entry, ['label', 'track', 'name']) || label : label;
      }

      function dashboardTrackTitle(entry) {
        return cleanTitle(pickFirst(entry, ['title', 'displayTitle', 'name', 'file', 'path'])) || dashboardTrackLabel(entry);
      }

      function dashboardArtist(entry) {
        return pickFirst(entry, ['artist', 'albumArtist', 'albumartist', 'album_artist', 'name']) || 'Artista sin metadata';
      }

      function dashboardSource(entry) {
        return pickFirst(entry, ['source', 'sourceName', 'source_name', 'origin', 'provider']);
      }

      function dashboardCount(entry) {
        return listenCountFromEntry(entry, 'dashboard');
      }

      function dashboardTrackCatalog(stats) {
        const catalog = new Map();
        limitedStatsEntries(stats && stats.tracks, 'track', Number.POSITIVE_INFINITY).forEach((entry) => {
          const track = normalizeTrackNumber(entry.track);
          if (track) catalog.set(track, entry);
        });
        return catalog;
      }

      function enrichDashboardTrack(entry, catalog) {
        const track = normalizeTrackNumber(dashboardTrackValue(entry));
        const catalogEntry = track ? catalog.get(track) : null;
        return catalogEntry ? { ...catalogEntry, ...entry } : entry;
      }

      function createTextElement(tagName, className, text) {
        const element = document.createElement(tagName);
        if (className) element.className = className;
        element.textContent = text;
        return element;
      }

      function replaceDashboardChildren(...children) {
        statsDashboard.textContent = '';
        children.forEach((child) => statsDashboard.append(child));
      }

      function createMetricCard(label, value, note) {
        const card = document.createElement('article');
        card.className = 'metric-card';
        card.append(
          createTextElement('p', 'metric-label', label),
          createTextElement('strong', 'metric-value', value),
          createTextElement('p', 'metric-note', note)
        );
        return card;
      }

      function createCycleMetricCard(cycle, totalTracks) {
        const total = finiteNumber(cycle.total, totalTracks);
        const played = finiteNumber(cycle.played, 0);
        const pending = finiteNumber(cycle.pending, Math.max(total - played, 0));
        const calculatedPercent = total > 0 ? (played / total) * 100 : 0;
        const percent = Math.min(100, Math.max(0, finiteNumber(cycle.percent, calculatedPercent)));
        const card = createMetricCard('cycle progress', `${Math.round(percent)}%`, `${formatNumber(played)} played · ${formatNumber(pending)} pending · ${formatNumber(total)} total`);
        const progress = document.createElement('div');
        const bar = document.createElement('div');
        progress.className = 'cycle-progress';
        bar.className = 'cycle-progress-bar';
        bar.style.width = `${percent}%`;
        progress.append(bar);
        card.append(progress);
        return card;
      }

      function createDashboardRow({ eyebrow, title, meta, value }) {
        const row = document.createElement('li');
        const main = document.createElement('span');
        row.className = 'dashboard-row';
        main.className = 'row-main';

        if (eyebrow) main.append(createTextElement('span', 'row-eyebrow', eyebrow));
        main.append(createTextElement('span', 'row-title', title));
        if (meta) main.append(createTextElement('span', 'row-meta', meta));
        row.append(main);
        if (value) row.append(createTextElement('span', 'row-value', value));
        return row;
      }

      function createDashboardList(title, items, rowBuilder, emptyMessage) {
        const card = document.createElement('article');
        const list = document.createElement('ol');
        card.className = 'dashboard-list-card';
        list.className = 'dashboard-list';
        card.append(createTextElement('h3', 'dashboard-list-title', title), list);

        if (!items.length) {
          const empty = document.createElement('li');
          empty.className = 'dashboard-empty';
          empty.textContent = emptyMessage;
          list.append(empty);
          return card;
        }

        items.forEach((entry) => list.append(rowBuilder(entry)));
        return card;
      }

      function renderStatsUnavailable() {
        const state = document.createElement('div');
        state.className = 'dashboard-state';
        state.append(
          createTextElement('p', 'dashboard-kicker', 'operator dashboard'),
          createTextElement('h2', 'dashboard-title', 'Stats no disponibles'),
          createTextElement('p', 'dashboard-message', 'No pude leer /stats.json; la búsqueda sigue funcionando con /manifest.json.')
        );
        replaceDashboardChildren(state);
      }

      function renderStatsDashboard(stats, manifestLibrary) {
        if (!stats || typeof stats !== 'object') {
          renderStatsUnavailable();
          return;
        }

        const cycle = stats.playback_cycle || {};
        const totalTracks = finiteNumber(stats.track_count, manifestLibrary.length);
        const recentPlays = limitedStatsEntries(stats.recently_played, 'track');
        const topTracks = limitedStatsEntries(stats.top_tracks, 'track');
        const topArtists = limitedStatsEntries(stats.top_artists, 'artist');
        const catalog = dashboardTrackCatalog(stats);
        const pendingTracks = limitedStatsEntries(stats.pending_tracks || cycle.pending_tracks, 'track')
          .map((entry) => enrichDashboardTrack(entry, catalog));
        const header = document.createElement('header');
        const titleGroup = document.createElement('div');
        const metrics = document.createElement('div');
        const lists = document.createElement('div');

        header.className = 'dashboard-header';
        titleGroup.className = 'dashboard-title-group';
        titleGroup.append(
          createTextElement('p', 'dashboard-kicker', 'operator dashboard'),
          createTextElement('h2', 'dashboard-title', 'Private library pulse')
        );
        header.append(
          titleGroup,
          createTextElement('p', 'dashboard-message', `${formatNumber(totalTracks)} tracks locales · ${formatNumber(recentPlays.length)} recientes visibles`)
        );

        metrics.className = 'metrics-grid';
        metrics.append(
          createMetricCard('total tracks', formatNumber(totalTracks), stats.track_count ? 'reportado por /stats.json' : 'fallback desde manifest'),
          createCycleMetricCard(cycle, totalTracks)
        );

        lists.className = 'dashboard-lists';
        lists.append(
          createDashboardList('recent plays', recentPlays, (entry) => {
            const source = dashboardSource(entry);
            return createDashboardRow({
              eyebrow: dashboardTrackLabel(entry),
              title: dashboardTrackTitle(entry),
              meta: [dashboardArtist(entry), source].filter(Boolean).join(' · '),
            });
          }, 'Todavía no hay escuchas recientes.'),
          createDashboardList('top tracks', topTracks, (entry) => createDashboardRow({
            eyebrow: dashboardTrackLabel(entry),
            title: dashboardTrackTitle(entry),
            meta: dashboardArtist(entry),
            value: `${formatNumber(dashboardCount(entry))} plays`,
          }), 'No hay ranking de tracks todavía.'),
          createDashboardList('top artists', topArtists, (entry) => createDashboardRow({
            title: dashboardArtist(entry),
            value: `${formatNumber(dashboardCount(entry))} plays`,
          }), 'No hay artistas top todavía.'),
          createDashboardList('pending tracks', pendingTracks, (entry) => createDashboardRow({
            eyebrow: dashboardTrackLabel(entry),
            title: dashboardTrackTitle(entry),
            meta: dashboardArtist(entry),
          }), 'Ciclo limpio: no quedan tracks pendientes.')
        );

        replaceDashboardChildren(header, metrics, lists);
      }

      function searchableFields(item) {
        const normalizedTrack = normalizeTrackNumber(item.track);
        const looseTrack = normalizedTrack ? String(Number(normalizedTrack)) : '';
        return [
          normalizedTrack,
          looseTrack,
          normalizedTrack && `track ${normalizedTrack}`,
          looseTrack && `track ${looseTrack}`,
          item.artist,
          item.albumArtist,
          item.albumartist,
          item.title,
          item.album,
          item.genre,
          item.listenCount,
          displayTitle(item),
          item.path,
          item.url,
        ].filter(Boolean).map(normalizeText);
      }

      function matchesQuery(item, query) {
        const textQuery = normalizeText(query);
        if (!textQuery) return true;

        const numericQuery = normalizeTrackQuery(textQuery);
        if (numericQuery) return normalizeTrackNumber(item.track) === numericQuery;

        return searchableFields(item).some((field) => field.includes(textQuery));
      }

      function setState(title, message) {
        results.innerHTML = '';
        const state = document.createElement('div');
        state.className = 'state-card';
        state.innerHTML = `<strong>${title}</strong><p>${message}</p>`;
        results.append(state);
      }

      function renderCount() {
        const total = library.length;
        const shown = visibleTracks.length;
        const query = normalizeText(searchInput.value);

        if (!total) {
          resultCount.textContent = 'Manifest cargado sin tracks.';
          return;
        }

        if (!query) {
          resultCount.textContent = `${total} ${total === 1 ? 'track local' : 'tracks locales'} disponibles.`;
          return;
        }

        resultCount.textContent = `${shown} de ${total} ${shown === 1 ? 'resultado' : 'resultados'} para "${searchInput.value}".`;
      }

      function playCountThreshold(audio) {
        if (!Number.isFinite(audio.duration) || audio.duration <= 0) return 5;
        return Math.min(5, Math.max(1, audio.duration * 0.2));
      }

      async function recordLibraryPlay(item) {
        try {
          const response = await fetch('/library-play', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              track: item.track,
              artist: item.artist || item.albumArtist || item.albumartist || '',
              title: displayTitle(item),
              album: item.album || '',
              genre: item.genre || '',
            }),
            cache: 'no-store',
            keepalive: true,
          });
          if (!response.ok) throw new Error(`Library play HTTP ${response.status}`);
        } catch (error) {
          console.warn('Library play was not recorded.', error);
        }
      }

      function attachLibraryPlayCounter(audio, item) {
        let state = { counted: false, lastTime: 0, listenedSeconds: 0 };

        const resetSession = () => {
          state = { counted: false, lastTime: audio.currentTime || 0, listenedSeconds: 0 };
        };

        const countOnce = () => {
          if (state.counted) return;
          state.counted = true;
          void recordLibraryPlay(item);
        };

        audio.addEventListener('play', () => {
          if (state.counted && audio.currentTime < 1) resetSession();
          state.lastTime = audio.currentTime || 0;
        });

        audio.addEventListener('seeked', () => {
          state.lastTime = audio.currentTime || 0;
        });

        audio.addEventListener('timeupdate', () => {
          if (state.counted || audio.paused) return;
          const currentTime = audio.currentTime || 0;
          const delta = currentTime - state.lastTime;
          state.lastTime = currentTime;
          if (delta > 0 && delta <= 2.5) state.listenedSeconds += delta;
          if (state.listenedSeconds >= playCountThreshold(audio)) countOnce();
        });

        audio.addEventListener('ended', () => {
          countOnce();
          resetSession();
        });
      }

      function renderTracks() {
        results.innerHTML = '';
        visibleTracks.forEach((item) => {
          const node = trackTemplate.content.firstElementChild.cloneNode(true);
          const normalizedTrack = normalizeTrackNumber(item.track);
          const label = trackLabel(item.track);
          const artist = item.artist || item.albumArtist || item.albumartist || 'Artista sin metadata';
          const title = displayTitle(item);
          const metadata = [label, item.album, item.genre, item.listenCount && `${item.listenCount} escuchas`].filter(Boolean).join(' · ');
          const path = item.path || item.url || 'Ruta no disponible';
          const audio = node.querySelector('audio');
          const link = node.querySelector('a');
          const accessibleTitle = artist === 'Artista sin metadata' ? title : `${title} de ${artist}`;

          node.querySelector('.track-number').textContent = normalizedTrack || '???';
          node.querySelector('.track-artist').textContent = artist;
          node.querySelector('.track-title').textContent = title;
          node.querySelector('.track-meta').textContent = metadata;
          node.querySelector('.track-path').textContent = path;

          audio.src = item.url || '';
          audio.setAttribute('aria-label', `Reproducir ${accessibleTitle}`);
          attachLibraryPlayCounter(audio, item);

          link.href = item.url || '#';
          link.download = path.split('/').pop() || '';
          link.setAttribute('aria-label', `Abrir o descargar ${accessibleTitle}`);
          if (!item.url) link.setAttribute('aria-disabled', 'true');

          results.append(node);
        });
      }

      function applySearch() {
        visibleTracks = library.filter((item) => matchesQuery(item, searchInput.value));
        renderCount();

        if (!library.length) {
          setState('La bóveda está vacía', 'El manifest respondió bien, pero no trae entradas para mostrar. Otra travesura elegante del homelab.');
          return;
        }

        if (!visibleTracks.length) {
          setState('Sin coincidencias', 'Prueba el número limpio, tipo 28, o busca por un pedazo del artista, título o ruta original.');
          return;
        }

        renderTracks();
      }

      async function refreshStatsDashboard() {
        if (statsRefreshInFlight) return;

        statsRefreshInFlight = true;
        try {
          const statsPayload = await fetchStatsMetadata();
          renderStatsDashboard(statsPayload.stats, library);
        } finally {
          statsRefreshInFlight = false;
        }
      }

      async function loadManifest() {
        try {
          const response = await fetch('/manifest.json', { cache: 'no-store' });
          if (!response.ok) throw new Error(`Manifest HTTP ${response.status}`);

          const manifest = await response.json();
          if (!Array.isArray(manifest)) throw new Error('Manifest is not an array');

          const statsPayload = await fetchStatsMetadata();
          library = enrichManifest(manifest, statsPayload.metadataByKey);
          renderStatsDashboard(statsPayload.stats, library);
          applySearch();
        } catch (error) {
          library = [];
          visibleTracks = [];
          resultCount.textContent = 'No pude cargar /manifest.json.';
          renderStatsUnavailable();
          setState('Manifest no disponible', 'Esta página no asume build ni archivo local previo. Cuando Caddy sirva /manifest.json, la biblioteca aparece aquí.');
          console.error(error);
        }
      }

      searchInput.addEventListener('input', applySearch);
      clearButton.addEventListener('click', () => {
        searchInput.value = '';
        searchInput.focus();
        applySearch();
      });
      shuffleSticker.addEventListener('click', setRandomSticker);

      loadManifest().then(() => {
        setInterval(refreshStatsDashboard, STATS_REFRESH_INTERVAL_MS);
      });
      setRandomSticker();
    </script>
  </body>
</html>
